<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Dashboard — URIGOD.GE</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--t1); font-family: var(--font-sans); }
  
  /* Sidebar */
  .sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--bdr); display: flex; flex-direction: column; padding: 24px; flex-shrink: 0; }
  .sb-logo { font-family: var(--font-serif); font-size: 24px; color: var(--cyan); margin-bottom: 40px; font-weight: 900; letter-spacing: 1px; }
  .sb-logo em { color: #fff; font-style: normal; }
  .sb-menu { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .sb-link { padding: 14px 18px; border-radius: 14px; color: var(--t2); text-decoration: none; font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 12px; transition: .2s; border: 1px solid transparent; cursor: pointer; }
  .sb-link:hover { background: var(--glass2); color: var(--t1); }
  .sb-link.active { background: var(--cyan-d); color: var(--cyan); border-color: var(--bdr-cyan); }
  .sb-bottom { margin-top: auto; border-top: 1px solid var(--bdr); padding-top: 20px; }
  
  /* Main Content */
  .main-content { flex: 1; overflow-y: auto; padding: 40px; background: var(--bg); }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--bdr); }
  .page-title { font-size: 28px; font-weight: 800; font-family: var(--font-serif); }
  .badge-count { background: var(--cyan); color: #000; padding: 2px 10px; border-radius: 100px; font-size: 14px; margin-left: 10px; vertical-align: middle; }
  
  /* Search input */
  .admin-search-bar { width: 100%; background: var(--bg2); border: 1px solid var(--bdr); border-radius: 14px; padding: 12px 16px; color: var(--t1); font-size: 14px; outline: none; margin-bottom: 24px; font-family: inherit; box-sizing: border-box; }
  .admin-search-bar:focus { border-color: var(--cyan); }

  /* Grid System */
  .reviews-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
  
  /* Cards */
  .rv-card { background: var(--bg2); border: 1px solid var(--bdr); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; transition: transform .2s, border-color .2s; }
  .rv-card:hover { transform: translateY(-4px); border-color: var(--cyan); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .rv-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .rv-user { display: flex; align-items: center; gap: 12px; }
  .rv-avi { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid var(--cyan); flex-shrink: 0; }
  .rv-name { font-weight: 800; font-size: 15px; margin-bottom: 4px; }
  .rv-date { font-size: 12px; color: var(--t3); }
  .rv-target { display: inline-block; background: rgba(0,200,170,.1); color: var(--cyan); padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-bottom: 16px; border: 1px solid var(--bdr-cyan); }
  .rv-stars { color: var(--gold); letter-spacing: 2px; font-size: 16px; margin-bottom: 12px; }
  .rv-text { font-size: 14px; color: var(--t2); line-height: 1.6; background: var(--bg3); padding: 16px; border-radius: 12px; flex: 1; margin-bottom: 20px; border: 1px solid var(--bdr2); }
  
  .rv-actions { display: flex; gap: 12px; }
  .btn-rj { flex: 1; background: rgba(239,68,68,.1); color: #ef4444; border: 1px solid rgba(239,68,68,.3); padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: .2s; text-align: center; }
  .btn-rj:hover { background: #ef4444; color: #fff; }
  .btn-ap { flex: 1; background: rgba(34,197,94,.1); color: #22c55e; border: 1px solid rgba(34,197,94,.3); padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: .2s; text-align: center; }
  .btn-ap:hover { background: #22c55e; color: #000; }

  .empty-state { grid-column: 1 / -1; text-align: center; padding: 100px 20px; color: var(--t3); }
  .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }

  /* ── ადმინ პანელის რესპონსივი (მობილურის ვერსია) ── */
  @media (max-width: 768px) {
    body { flex-direction: column; overflow-y: auto; height: auto; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--bdr); padding: 16px; flex-direction: column; }
    .sb-logo { margin-bottom: 16px; text-align: center; }
    .sb-menu { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 8px; }
    .sb-link { padding: 10px 14px; font-size: 13px; }
    .sb-bottom { margin-top: 16px; padding-top: 16px; justify-content: center; }
    .main-content { padding: 16px; overflow-y: visible; }
    .page-header { flex-direction: column; align-items: flex-start; gap: 8px; margin-bottom: 20px; }
    .page-title { font-size: 22px; }
    .reviews-grid { grid-template-columns: 1fr; gap: 16px; }
    .rv-actions { flex-direction: column; }
    .btn-rj, .btn-ap { width: 100%; padding: 12px; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo">URIGOD<em>.</em>GE <span style="font-size:10px; vertical-align:top; color:var(--red);">ADMIN</span></div>
  
  <div class="sb-menu">
    <div id="menu-pending" class="sb-link active" onclick="switchSection('pending')">
      <span>📥</span> მოლოდინში
    </div>
    <div id="menu-all" class="sb-link" onclick="switchSection('all')">
      <span>💬</span> ყველა შეფასება
    </div>
    <div class="sb-link" onclick="alert('მალე დაემატება!')">
      <span>📊</span> სტატისტიკა
    </div>
  </div>

  <div class="sb-bottom">
    <a href="index.html" class="sb-link" style="padding:0; background:none; border:none;">
      <span>←</span> საიტზე დაბრუნება
    </a>
  </div>
</aside>

<main class="main-content">
  <div class="page-header">
    <div class="page-title" id="section-title">
      მოლოდინში მყოფი კომენტარები <span class="badge-count" id="badge-count">0</span>
    </div>
    <div style="color:var(--t3); font-size:14px;">ადმინისტრატორის პანელი</div>
  </div>

  <input type="text" id="adminSearch" class="admin-search-bar" style="display:none;" placeholder="მოძებნე იუზერის სახელით ან კომენტარის ტექსტით..." oninput="filterReviewsLocal()">

  <div class="reviews-grid" id="reviews-container">
    <div class="empty-state">იტვირთება მონაცემები...</div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script src="js/auth.js"></script>

<script>
let db = null;
let currentSection = 'pending'; 
let allLoadedReviews = []; 

function initDB() {
  if (!db && typeof firebase !== 'undefined') {
    // თუ რაღაც მიზეზით პირველ წამს არ ჩაირთო, აქედანაც ვაიძულებთ ინიციალიზაციას
    if (!firebase.apps.length && typeof firebaseConfig !== 'undefined') {
      firebase.initializeApp(firebaseConfig);
    }
    if (firebase.apps.length > 0) {
      db = firebase.firestore();
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  // ვაძლევთ 1 წამს, რომ იუზერის სტატუსი და სკრიპტები სინქრონიზდეს
  setTimeout(() => {
    initDB();
    
    const u = JSON.parse(localStorage.getItem('ug_user') || 'null');
    
    // დაზღვევა იმ შემთხვევისთვის, თუ auth.js-დან ADMIN_EMAILS-მა ვერ მოაღწია
    const allowedEmails = (typeof ADMIN_EMAILS !== 'undefined') 
      ? ADMIN_EMAILS 
      : ["nika@gmail.com", "saba@gmail.com", "urigodge8@gmail.com", "urigodge@gmail.com"];

    if (!u || !u.email || !allowedEmails.map(e => e.toLowerCase()).includes(u.email.toLowerCase())) {
      alert("⚠️ წვდომა შეზღუდულია! მხოლოდ ადმინისტრატორებისთვის.");
      window.location.href = 'index.html'; // სლეში მოვაშორე
      return;
    }
    
    if (db) {
      loadSectionData();
    } else {
      document.getElementById('reviews-container').innerHTML = 
        `<div class="empty-state">❌ ბაზასთან დაკავშირება ვერ მოხერხდა. შეამოწმეთ ინტერნეტი ან კონსოლი.</div>`;
    }
  }, 1000);
});

function switchSection(section) {
  currentSection = section;
  document.querySelectorAll('.sb-link').forEach(el => el.classList.remove('active'));
  
  if (section === 'pending') {
    document.getElementById('menu-pending').classList.add('active');
    document.getElementById('adminSearch').style.display = 'none';
    document.getElementById('section-title').innerHTML = `მოლოდინში მყოფი კომენტარები <span class="badge-count" id="badge-count">0</span>`;
  } else {
    document.getElementById('menu-all').classList.add('active');
    document.getElementById('adminSearch').style.display = 'block';
    document.getElementById('adminSearch').value = '';
    document.getElementById('section-title').innerHTML = `ყველა დამტკიცებული შეფასება <span class="badge-count" id="badge-count">0</span>`;
  }
  loadSectionData();
}

function loadSectionData() {
  initDB();
  const container = document.getElementById('reviews-container');
  container.innerHTML = '<div class="empty-state">იტვირთება მონაცემები...</div>';
  
  if (!db) {
    setTimeout(loadSectionData, 300);
    return;
  }
  
  if (currentSection === 'pending') {
    db.collection("reviews").where("status", "==", "pending").orderBy("createdAt", "desc")
      .onSnapshot((snap) => {
        if (currentSection !== 'pending') return;
        document.getElementById('badge-count').textContent = snap.size;

        if (snap.empty) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><h2>ყველაფერი სუფთაა!</h2><p>დასამტკიცებელი კომენტარები არ არის.</p></div>`;
          return;
        }

        let html = '';
        snap.forEach((doc) => {
          html += buildCardHTML(doc.id, doc.data(), true);
        });
        container.innerHTML = html;
      }, (err) => {
        console.error("Firestore Error:", err);
        container.innerHTML = `<div class="empty-state" style="color:#ef4444;">ერორი მონაცემების წაკითხვისას (Missing Permissions). დარწმუნდით, რომ ადმინის მეილით ხართ დალოგინებული!</div>`;
      });
  } else {
    db.collection("reviews").where("status", "==", "approved").orderBy("createdAt", "desc")
      .onSnapshot((snap) => {
        if (currentSection !== 'all') return;
        document.getElementById('badge-count').textContent = snap.size;

        if (snap.empty) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">🍽️</div><h2>ცარიელია</h2><p>ჯერჯერობით არცერთი დამტკიცებული კომენტარი არ არის საიტზე.</p></div>`;
          return;
        }

        allLoadedReviews = [];
        let html = '';
        snap.forEach((doc) => {
          const data = doc.data();
          allLoadedReviews.push({ id: doc.id, data: data });
          html += buildCardHTML(doc.id, data, false);
        });
        container.innerHTML = html;
      }, (err) => {
        console.error("Firestore Error:", err);
        container.innerHTML = `<div class="empty-state" style="color:#ef4444;">ერორი მონაცემების წაკითხვისას. შეამოწმეთ ადმინის სტატუსი.</div>`;
      });
  }
}

function buildCardHTML(id, d, isPending) {
  const stars = '★'.repeat(d.rating) + '☆'.repeat(5 - d.rating);
  let dateStr = 'უცნობი დრო';
  if (d.createdAt) {
    const date = new Date(d.createdAt.toDate());
    dateStr = date.toLocaleDateString('ka-GE', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  const actionButtons = isPending ? `
    <button class="btn-rj" onclick="handleReview('${id}', 'rejected')">✕ უარყოფა</button>
    <button class="btn-ap" onclick="handleReview('${id}', 'approved')">✓ დამტკიცება</button>
  ` : `
    <button class="btn-rj" style="width:100%; flex:none;" onclick="handleReview('${id}', 'rejected', true)">🗑️ საიტიდან წაშლა</button>
  `;

  const avatarHtml = d.userCustomAvatar 
      ? `<img src="${d.userCustomAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` 
      : (d.userAvatar || '👤');

  // 🔥 აქ ვამატებთ იუზერის უნიკალურ (უცვლელ) ID-ს
  const uidHtml = d.userId ? `<div style="font-size:11px; color:var(--cyan); margin-top:2px; font-family:monospace; letter-spacing:0.5px;">UID: ${d.userId}</div>` : '';

  return `
    <div class="rv-card">
      <div class="rv-top">
        <div class="rv-user">
          <div class="rv-avi" style="background:${d.userBg || '#222'}; overflow:hidden;">
            ${avatarHtml}
          </div>
          <div>
            <div class="rv-name">${d.userName || 'მომხმარებელი'}</div>
            ${uidHtml} <div class="rv-date" style="margin-top:2px;">${dateStr}</div>
          </div>
        </div>
      </div>
      <div class="rv-target">📍 ობიექტი: ${d.restaurantId}</div>
      <div class="rv-stars">${stars}</div>
      <div class="rv-text">"${d.text}"</div>
      <div class="rv-actions">${actionButtons}</div>
    </div>
  `;
}

function filterReviewsLocal() {
  const query = document.getElementById('adminSearch').value.toLowerCase().trim();
  const container = document.getElementById('reviews-container');
  
  const filtered = allLoadedReviews.filter(item => {
    return (item.data.userName || '').toLowerCase().includes(query) || 
           (item.data.text || '').toLowerCase().includes(query) || 
           (item.data.restaurantId || '').toLowerCase().includes(query);
  });

  document.getElementById('badge-count').textContent = filtered.length;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><h2>🤷‍♂️ ვერაფერი მოიძებნა</h2><p>კრიტერიუმით კომენტარი არ არსებობს.</p></div>`;
    return;
  }

  let html = '';
  filtered.forEach(item => {
    html += buildCardHTML(item.id, item.data, false);
  });
  container.innerHTML = html;
}

function handleReview(docId, newStatus, isDeleteAction = false) {
  const confirmMsg = isDeleteAction 
    ? 'ნამდვილად გსურს უკვე დამტკიცებული კომენტარის საიტიდან წაშლა?' 
    : (newStatus === 'approved' ? 'ნამდვილად ამტკიცებ ამ კომენტარს?' : 'ნამდვილად გინდა ამ კომენტარის უარყოფა?');

  if(confirm(confirmMsg)) {
    db.collection("reviews").doc(docId).update({
      status: newStatus
    }).then(() => {
      if(isDeleteAction) filterReviewsLocal(); 
    }).catch((error) => {
      console.error(error);
      alert("❌ ოპერაცია ვერ შესრულდა.");
    });
  }
}
</script>
</body>
</html>
