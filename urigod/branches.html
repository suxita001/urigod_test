<style>
/* ── Layout ────────────────────────────────────── */
.branches-layout{display:grid;grid-template-columns:280px 1fr;gap:32px;align-items:start;padding-bottom:80px}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
.res-count{font-size:14px;color:var(--t2)}
.sort-sel{background:var(--bg3);border:1px solid var(--bdr);border-radius:14px;padding:8px 14px;font-size:13px;color:var(--t1);outline:none;cursor:pointer;transition:.2s}
.sort-sel:focus{border-color:var(--bdr-cyan)}
.empty{text-align:center;padding:80px 20px;display:none}
.empty-ico{font-size:56px;margin-bottom:16px}
.empty-ttl{font-family:var(--font-serif);font-size:22px;font-weight:700;margin-bottom:8px}
.empty-sub{color:var(--t2)}

/* ── Filter sidebar ────────────────────────────── */
.cat-search{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:8px 12px;color:var(--t1);font-size:13px;margin-bottom:12px;outline:none;transition:border-color .2s;font-family:inherit;box-sizing:border-box}
.cat-search:focus{border-color:var(--cyan)}
.filter-tags-scroll{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}
.filter-tags-scroll::-webkit-scrollbar{width:4px}
.filter-tags-scroll::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
.filter-tags-scroll .tag{display:flex;align-items:center;justify-content:flex-start;text-align:left;width:100%;padding:8px 14px;border-radius:12px;background:transparent;border:1px solid var(--bdr);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;box-sizing:border-box}
.filter-tags-scroll .tag:hover{background:rgba(255,255,255,.03);border-color:var(--t3)}
.filter-tags-scroll .tag.active{background:rgba(0,229,200,.1);border-color:var(--cyan);color:var(--cyan);font-weight:700}

/* ── Dual slider ───────────────────────────────── */
.dual-slider{position:relative;width:100%;height:24px;margin:12px 0;display:flex;align-items:center}
.slider-track{position:absolute;width:100%;height:6px;background:var(--bdr);border-radius:4px}
.slider-fill{position:absolute;height:6px;background:var(--cyan);border-radius:4px}
.dual-slider input[type="range"]{position:absolute;width:100%;appearance:none;background:none;pointer-events:none;margin:0;outline:none}
.dual-slider input[type="range"]::-webkit-slider-thumb{pointer-events:auto;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg);cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.3);transition:transform .2s}
.dual-slider input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.2)}

/* ── Card overrides — fix badge overflow ──────── */
.res-card {
  overflow: hidden;          /* ← ბარათიდან გაუსვლელი */
  border-radius: 18px;
}
/* photo-wrap — relative რომ badge შიგნით იყოს */
.res-card .photo-wrap {
  position: relative;
  overflow: hidden;
  aspect-ratio: 16/9;
  border-radius: 0;          /* ბარათი უკვე rounded */
}

/* badge — ზედა მარჯვენა კუთხე, ბარათის photo-ში */
.res-card .res-badge {
  position: absolute;
  top: 10px; right: 10px;
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 11px; font-weight: 800;
  letter-spacing: .3px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  white-space: nowrap;
  z-index: 2;
  border: 1px solid transparent;
}
.res-badge.is-open   { background: rgba(0,229,200,.18); color: #00e5c8; border-color: rgba(0,229,200,.35); }
.res-badge.is-closed { background: rgba(255,61,107,.18); color: #ff3d6b; border-color: rgba(255,61,107,.35); }
.res-badge.is-promo  { background: rgba(200,168,75,.18); color: var(--gold); border-color: rgba(200,168,75,.35); }

/* status dot pill — ბარათის body-ში, cuisine ხაზის გვერდით */
.res-status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 700;
  margin-left: auto; flex-shrink: 0;
}
.res-status-pill.open   { background: rgba(0,229,200,.1);   color: #00e5c8; }
.res-status-pill.closed { background: rgba(255,61,107,.1); color: #ff3d6b; }

/* cuisine + status row */
.res-cuisine-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.res-cuisine-row .res-cuisine { margin-bottom: 0; flex: 1; }

/* meta row — cleaner */
.res-card .res-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--t3);
  padding: 10px 0; border-top: 1px solid var(--bdr);
  border-bottom: 1px solid var(--bdr);
  margin-bottom: 12px;
}
.res-card .res-meta span { display: flex; align-items: center; gap: 4px; }

/* footer buttons */
.res-card .res-footer { display: flex; gap: 8px; }

@media(max-width:960px){.branches-layout{grid-template-columns:1fr}.filter-panel{position:static}.res-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.res-grid{grid-template-columns:1fr}}
</style>

<script>
let activeCuisines = [];
let minRating = 0, maxRating = 5;
let onlyOpen = false, sortMode = 'default', searchQ = '';

const params = new URLSearchParams(window.location.search);
if(params.get('cuisine') && params.get('cuisine') !== 'all') activeCuisines.push(params.get('cuisine'));
if(params.get('q')){ searchQ=params.get('q'); document.getElementById('hSearch').value=searchQ; }

/* ── Helpers ─────────────────────────────────── */
function hoursStr(r) {
  const h = r.branches[0]?.hours;
  if (!h) return r.hours || '—';
  if (typeof h === 'string') return h;
  return LANG_GET()==='en' ? (h.en||h.ka) : (h.ka||h.en);
}

/* ── Category tags ───────────────────────────── */
function buildTags() {
  const L = LANG_GET();
  const q = (document.getElementById('catSearch')?.value||'').toLowerCase();
  let html = '';
  if(!q){
    const allActive = activeCuisines.length===0;
    html += `<button class="tag${allActive?' active':''}" onclick="toggleCuisine('all')">🍽️ ${L==='en'?'All':'ყველა'}</button>`;
  }
  CATEGORIES.forEach(c=>{
    if(c.id==='all') return;
    const name = L==='en'?c.en:c.ka;
    if(!name.toLowerCase().includes(q)) return;
    const isActive = activeCuisines.includes(c.id);
    html+=`<button class="tag${isActive?' active':''}" onclick="toggleCuisine('${c.id}')">${c.emoji} ${name}</button>`;
  });
  document.getElementById('cuisineTags').innerHTML=html;
}

function toggleCuisine(id){
  if(id==='all') activeCuisines=[];
  else {
    if(activeCuisines.includes(id)) activeCuisines=activeCuisines.filter(x=>x!==id);
    else activeCuisines.push(id);
  }
  buildTags(); render();
}

/* ── Rating slider ───────────────────────────── */
function updateRatingSlider(){
  const mn=document.getElementById('rMin'), mx=document.getElementById('rMax');
  let v1=parseFloat(mn.value), v2=parseFloat(mx.value);
  if(v1>v2){let t=v1;v1=v2;v2=t;mn.value=v1;mx.value=v2;}
  minRating=v1; maxRating=v2;
  document.getElementById('rValLbl').innerHTML=`<span style="color:var(--cyan)">${v1.toFixed(1)}</span> - <span style="color:var(--cyan)">${v2.toFixed(1)}</span> ★`;
  const fill=document.getElementById('sliderFill');
  fill.style.left=`${(v1/5)*100}%`;
  fill.style.width=`${((v2-v1)/5)*100}%`;
  render();
}

/* ── Main render ─────────────────────────────── */
function render(){
  const L=LANG_GET(), ka=L==='ka';
  let list=[...RESTAURANTS];

  if(activeCuisines.length>0)
    list=list.filter(r=>{ const t=r.tags||[r.cuisineTag]; return activeCuisines.every(x=>t.includes(x)); });
  list=list.filter(r=>r.rating>=minRating&&r.rating<=maxRating);
  if(onlyOpen) list=list.filter(r=>r.status==='open');
  if(searchQ){ const q=searchQ.toLowerCase(); list=list.filter(r=>tl(r.name).toLowerCase().includes(q)||tl(r.cuisine).toLowerCase().includes(q)||r.branches.some(b=>tl(b.address).toLowerCase().includes(q))); }
  if(sortMode==='rating-desc') list.sort((a,b)=>b.rating-a.rating);
  if(sortMode==='rating-asc')  list.sort((a,b)=>a.rating-b.rating);
  if(sortMode==='name')        list.sort((a,b)=>tl(a.name).localeCompare(tl(b.name)));

  const grid=document.getElementById('resGrid');
  const empty=document.getElementById('emptyState');
  document.getElementById('resCount').textContent=`${list.length} ${ka?'რესტორანი':'venues'}`;
  if(!list.length){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  grid.innerHTML=list.map((r,i)=>{
    const isOpen   = r.status==='open';
    const isClosed = r.status==='closed';

    // ფოტოზე: თუ promo badge გაქვს → ოქროსფერი, სხვა შემთხვევაში nothing (status body-შია)
    const photoBadge = r.badge
      ? `<span class="res-badge is-promo">${tl(r.badge)}</span>`
      : '';

    // status pill — body-ში, cuisine-ის გვერდით
    const statusPill = isOpen
      ? `<span class="res-status-pill open">🟢 ${ka?'ღიაა':'Open'}</span>`
      : isClosed
        ? `<span class="res-status-pill closed">🔴 ${ka?'დახ.':'Closed'}</span>`
        : '';

    const hrs = hoursStr(r);

    return `<div class="res-card anim-fade-up" style="animation-delay:${i*0.05}s;cursor:pointer" onclick="window.location.href='restaurants/${r.slug}/index.html'">
      <div class="photo-wrap">
        ${r.cover
          ?`<img src="${r.cover}" alt="${tl(r.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="emoji-fallback" style="display:none">${r.emoji}</span>`
          :`<span class="emoji-fallback">${r.emoji}</span>`
        }
        ${photoBadge}
      </div>
      <div class="res-card-body">
        <div class="res-row" style="margin-bottom:6px">
          <div class="res-name">${tl(r.name)}</div>
          <div class="res-rating"><span class="star">★</span>${r.rating}</div>
        </div>
        <div class="res-cuisine-row">
          <div class="res-cuisine">${tl(r.cuisine)}</div>
          ${statusPill}
        </div>
        <div class="res-meta">
          <span>🕐 ${hrs}</span>
          <span>📍 ${r.branches.length} ${ka?'ფილიალი':'branches'}</span>
        </div>
        <div class="res-footer">
          <button class="btn btn-outline btn-sm" style="flex:1;opacity:.5;cursor:not-allowed" disabled
            onclick="event.stopPropagation()">
            📅 ${ka?'ჯავშანი':'Reserve'}
          </button>
          <button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center"
            onclick="event.stopPropagation();window.location.href='restaurants/${r.slug}/menu.html'">
            ${ka?'მენიუ':'Menu'} →
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── i18n ────────────────────────────────────── */
function applyI18n(){
  const ka=LANG_GET()==='ka';
  document.getElementById('pageTitle').textContent=ka?'ჩვენი ფილიალები':'Our Branches';
  document.getElementById('f-ttl').textContent=ka?'ფილტრი':'Filters';
  document.getElementById('f-cuisine-lbl').textContent=ka?'სამზარეულო':'Cuisine';
  document.getElementById('f-rating-lbl').textContent=ka?'რეიტინგი':'Rating';
  document.getElementById('f-status-lbl').textContent=ka?'სტატუსი':'Status';
  document.getElementById('f-open-lbl').textContent=ka?'🟢 მხოლოდ ღია':'🟢 Open only';
  document.getElementById('f-reset-lbl').textContent=ka?'გასუფთავება':'Reset';
  const si=document.getElementById('catSearch'); if(si) si.placeholder=ka?'🔍 მოძებნე კატეგორია...':'🔍 Search category...';
  document.getElementById('so0').textContent=ka?'დეფაულტი':'Default';
  document.getElementById('so1').textContent=ka?'რეიტინგი ↓':'Rating ↓';
  document.getElementById('so2').textContent=ka?'რეიტინგი ↑':'Rating ↑';
  document.getElementById('so3').textContent=ka?'სახელი ა→ჰ':'Name A→Z';
  document.getElementById('emptyTtl').textContent=ka?'ვერ მოიძებნა':'Not found';
  document.getElementById('emptySub').textContent=ka?'შეცვალეთ ფილტრები':'Change filters';
  document.getElementById('f-desc').textContent=ka?'საუკეთესო გარემოს პოვნაში.':'Find the best atmosphere in Georgia.';
  buildTags(); render();
}
window.rerender=applyI18n;

/* ── Events ──────────────────────────────────── */
document.getElementById('onlyOpen').addEventListener('change',e=>{onlyOpen=e.target.checked;render();});
document.getElementById('sortSel').addEventListener('change',e=>{sortMode=e.target.value;render();});
document.getElementById('hSearch').addEventListener('input',e=>{searchQ=e.target.value;render();});
document.getElementById('resetBtn').addEventListener('click',()=>{
  activeCuisines=[];minRating=0;maxRating=5;onlyOpen=false;sortMode='default';searchQ='';
  document.getElementById('rMin').value=0;
  document.getElementById('rMax').value=5;
  updateRatingSlider();
  document.getElementById('catSearch').value='';
  document.getElementById('onlyOpen').checked=false;
  document.getElementById('sortSel').value='default';
  document.getElementById('hSearch').value='';
  buildTags();render();
});

document.addEventListener('DOMContentLoaded',()=>{
  OpenStatus.patchAll(RESTAURANTS);
  updateRatingSlider();
  applyI18n();
});
</script>
