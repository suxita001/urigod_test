<script src="data.js"></script>
<script src="../../js/main.js"></script>
<script src="../../js/calculator.js"></script>
<script src="../../js/variant-picker.js"></script>
<script>
function tl(o){ return !o||typeof o==='string'?o||'':(LANG_GET()==='en'?o.en||o.ka:o.ka||o.en||''); }

let openCatId = null;

/* ── Render menu ──────────────────────────────── */
function renderMenu(){
  const R=RESTAURANT, L=LANG_GET(), ka=L==='ka';
  document.title=`${tl(R.name)} — ${ka?'მენიუ':'Menu'} — URIGOD.GE`;

  document.getElementById('bc1').textContent     = ka?'ყველა ფილიალი':'All Branches';
  document.getElementById('bc2').textContent     = tl(R.name);
  document.getElementById('bc3').textContent     = ka?'მენიუ':'Menu';
  document.getElementById('f-back-res').textContent = tl(R.name);
  document.getElementById('mEmoji').textContent  = R.emoji;
  document.getElementById('mName').textContent   = `${tl(R.name)} — ${ka?'მენიუ':'Menu'}`;
  document.getElementById('mSub').textContent    =
    `${R.menu.length} ${ka?'კატეგორია':'categories'} · ${R.menu.reduce((s,c)=>s+c.items.length,0)} ${ka?'პროდუქტი':'items'}`;
  document.getElementById('m-book-txt').textContent = ka?'ჯავშანი':'Reserve';
  document.getElementById('m-back-txt').textContent = tl(R.name);
  document.getElementById('catTitleTxt').textContent = ka?'კატეგორიები':'Menu Categories';
  document.getElementById('close-txt').textContent   = ka?'დახურვა':'Close';

  // Category cards
  document.getElementById('menuCatGrid').innerHTML = R.menu.map((cat, i) => {
    const img = cat.catImg
      ? `<img src="${cat.catImg}" alt="${tl(cat.name)}" loading="lazy"
             style="width:100%;height:100%;object-fit:cover;transition:.5s"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <span class="emoji-fallback" style="display:none;font-size:56px">${cat.emoji}</span>`
      : `<span class="emoji-fallback" style="font-size:56px">${cat.emoji}</span>`;
    return `
      <div class="menu-cat-card anim-scale-in${openCatId===cat.id?' active':''}"
           style="animation-delay:${i*0.06}s"
           onclick="openCat('${cat.id}')">
        <div class="menu-cat-img">
          <div class="photo-wrap" style="height:100%">${img}</div>
          <div class="menu-cat-overlay"></div>
        </div>
        <div class="menu-cat-body">
          <div class="menu-cat-name">${tl(cat.name)}</div>
          <div class="menu-cat-count">${cat.items.length} ${ka?'პროდუქტი':'items'}</div>
        </div>
      </div>`;
  }).join('');

  if(openCatId) openCat(openCatId);
}

/* ── Open category ────────────────────────────── */
function openCat(id){
  const R=RESTAURANT, ka=LANG_GET()==='ka';
  openCatId = id;
  const cat = R.menu.find(c=>c.id===id);
  if(!cat) return;

  document.querySelectorAll('.menu-cat-card').forEach((el,i)=>{
    el.classList.toggle('active', R.menu[i]?.id===id);
  });

  document.getElementById('iEmoji').textContent = cat.emoji;
  document.getElementById('iTitle').textContent = tl(cat.name);
  document.getElementById('iCount').textContent = `${cat.items.length} ${ka?'პროდუქტი':'items'}`;

  document.getElementById('itemsGrid').innerHTML = cat.items.map((item, i) => {
    const hasVariants = item.variants && item.variants.length > 0;
    const imgHtml = item.img
      ? `<img src="${item.img}" alt="${tl(item.name)}" loading="lazy"
             style="width:100%;height:100%;object-fit:cover"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <span class="emoji-fallback" style="display:none;font-size:40px">${cat.emoji}</span>`
      : `<span class="emoji-fallback" style="font-size:40px">${cat.emoji}</span>`;

    // ფასის ხაზი: variants-ის შემთხვევაში "X ₾-დან" გამოჩნდება
    const priceDisplay = hasVariants
      ? (() => {
          const prices = item.variants.flatMap(g => g.options.map(o =>
            parseFloat(String(o.price).replace(/[^\d.]/g,''))||0
          ));
          const min = Math.min(...prices);
          return `${min.toFixed(0)} ₾${ka?'-დან':'+'}`;
        })()
      : item.price;

    return `
      <div class="item-card${item.popular?' popular':''} anim-scale-in" style="animation-delay:${i*0.04}s">
        <div class="photo-wrap item-photo">${imgHtml}</div>
        <div class="item-body">
          ${item.popular?`<span class="item-pop-badge">🔥 ${ka?'პოპულარული':'Popular'}</span>`:''}
          <div class="item-name">${tl(item.name)}</div>
          <div class="item-desc">${tl(item.desc)}</div>
          <div class="item-price">${priceDisplay}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('itemsPanel').classList.add('open');

  setTimeout(()=>{
    // კალკულატორის ღილაკები (ვარიანტი არ ქონდეთ)
    if(typeof UrigodCalc !== 'undefined') UrigodCalc.injectButtons(id);
    // ვარიანტის ღილაკები (ვარიანტი ქონდეთ)
    injectVariantButtons(id);
    // scroll
    document.getElementById('itemsPanel').scrollIntoView({behavior:'smooth',block:'start'});
  }, 80);
}

/* ── Close items panel ────────────────────────── */
function closeItems(){
  document.getElementById('itemsPanel').classList.remove('open');
  openCatId = null;
  document.querySelectorAll('.menu-cat-card').forEach(el=>el.classList.remove('active'));
}

/* ── Inject variant picker buttons ───────────── */
function injectVariantButtons(catId){
  const R   = RESTAURANT;
  const cat = R.menu.find(c=>c.id===catId);
  if(!cat) return;
  const ka  = LANG_GET()==='ka';

  cat.items.forEach((item, idx)=>{
    if(!item.variants || !item.variants.length) return;

    const cards = document.querySelectorAll('#itemsGrid .item-card');
    const card  = cards[idx];
    if(!card) return;

    const body = card.querySelector('.item-body');
    if(!body) return;

    // plain "+" ღილაკი ამოვიღოთ — variant picker-ი ანაცვლებს
    body.querySelector('.item-add-btn')?.remove();

    const btn = document.createElement('button');
    btn.className = 'item-add-btn';
    btn.style.cssText = 'margin-top:8px;border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim)';
    btn.innerHTML = `🎛️ ${ka?'ვარიანტის არჩევა':'Choose variant'}`;
    btn.addEventListener('click', ()=>VariantPicker.open(catId, idx, item));
    body.appendChild(btn);
  });
}

window.rerender = renderMenu;
document.addEventListener('DOMContentLoaded', renderMenu);
</script>
</body>
</html>
