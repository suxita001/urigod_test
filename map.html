<style>
/* ── Base ─────────────────────────────────────────────── */
html, body { height: 100%; overflow: hidden; margin: 0; }
.map-page  { height: 100vh; display: flex; flex-direction: column; position: relative; }
#fullMap   { flex: 1; width: 100%; }

/* ── CSS Variables ────────────────────────────────────── */
:root {
  --panel-w: 292px;
  --panel-r: 286px;
  --collapse-size: 44px;
  --panel-radius: 18px;
  --glass-dark: rgba(8,8,8,.92);
  --glass-light: rgba(245,244,240,.94);
  --trans: cubic-bezier(.4,0,.2,1);
}

/* ── Shared panel skin ────────────────────────────────── */
.mp {
  position: absolute;
  z-index: 500;
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border: 1px solid var(--bdr);
  background: var(--glass-dark);
  transition: width .35s var(--trans), height .35s var(--trans), border-radius .35s var(--trans), opacity .25s, transform .35s var(--trans);
}
body.light .mp { background: var(--glass-light); }

/* ── LEFT & RIGHT panels ──────────────────────────────── */
.mp-left { top: calc(var(--nav-h) + 14px); left: 14px; width: var(--panel-w); border-radius: var(--panel-radius); overflow: hidden; display: flex; flex-direction: column; max-height: calc(100vh - var(--nav-h) - 28px); }
.mp-right { top: calc(var(--nav-h) + 14px); right: 14px; width: var(--panel-r); border-radius: var(--panel-radius); overflow: hidden; display: flex; flex-direction: column; max-height: calc(100vh - var(--nav-h) - 28px); }
.mp-left.collapsed, .mp-right.collapsed { width: var(--collapse-size); height: var(--collapse-size); border-radius: 50%; overflow: hidden; }
.mp-left.collapsed .mp-body, .mp-left.collapsed .mp-footer, .mp-right.collapsed .mp-body { display: none; }

/* ── Panel header ─────────────────────────────────────── */
.mp-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; flex-shrink: 0; min-height: var(--collapse-size); cursor: default; }
.mp-head-label { font-size: 11px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--t2); white-space: nowrap; overflow: hidden; opacity: 1; transition: opacity .2s; }
.mp-left.collapsed .mp-head-label, .mp-right.collapsed .mp-head-label { opacity: 0; width: 0; }
.mp-toggle { width: 28px; height: 28px; border-radius: 50%; background: var(--glass2); border: 1px solid var(--bdr); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--t2); font-size: 14px; flex-shrink: 0; transition: background .2s, border-color .2s, transform .3s var(--trans); outline: none; }
.mp-toggle:hover { background: var(--glass2); border-color: var(--bdr-cyan); color: var(--cyan); }
.mp-left.collapsed .mp-toggle, .mp-right.collapsed .mp-toggle { width: var(--collapse-size); height: var(--collapse-size); border-radius: 50%; background: var(--cyan); border-color: var(--cyan); color: #080808; font-size: 18px; margin: 0 auto; }
.mp-left.collapsed .mp-head, .mp-right.collapsed .mp-head { padding: 0; justify-content: center; }

/* ── Panel body & footer ──────────────────────────────── */
.mp-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 14px 10px; scrollbar-width: thin; scrollbar-color: var(--bdr2) transparent; }
.mp-body::-webkit-scrollbar { width: 4px; }
.mp-body::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 2px; }
.mp-footer { padding: 10px 14px 14px; flex-shrink: 0; border-top: 1px solid var(--bdr); }
.mp-divider { height: 1px; background: var(--bdr); margin: 10px 0; }

/* ── Search box & UI Components ───────────────────────── */
.mp-search { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
.mp-search input { background: none; border: none; outline: none; color: var(--t1); font-size: 14px; flex: 1; font-family: inherit; }
.mp-search input::placeholder { color: var(--t3); }
.fl-lbl { font-size: 11px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--t3); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.cat-chips { display: flex; flex-direction: column; gap: 4px; max-height: 160px; overflow-y: auto; scrollbar-width: thin; margin-bottom: 4px; }
.cat-chip { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 10px; font-size: 13px; font-weight: 500; background: var(--glass); border: 1px solid var(--bdr); color: var(--t2); cursor: pointer; text-align: left; white-space: nowrap; transition: .18s; }
.cat-chip:hover { background: var(--glass2); color: var(--t1); }
.cat-chip.sel { background: var(--cyan-d); border-color: var(--bdr-cyan); color: var(--cyan); }
.cat-search-in { width: 100%; background: var(--glass); border: 1px solid var(--bdr); border-radius: 8px; padding: 6px 10px; color: var(--t1); font-size: 12px; outline: none; margin-bottom: 6px; }
.cat-search-in:focus { border-color: var(--bdr-cyan); }

/* ── Dual range slider ────────────────────────────────── */
.dual-wrap { position: relative; height: 20px; margin: 6px 0 4px; }
.dual-track { position: absolute; top: 50%; transform: translateY(-50%); left: 0; right: 0; height: 4px; background: var(--bdr); border-radius: 2px; }
.dual-fill { position: absolute; top: 50%; transform: translateY(-50%); height: 4px; background: var(--cyan); border-radius: 2px; pointer-events: none; }
.dual-wrap input[type=range] { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); appearance: none; -webkit-appearance: none; background: none; pointer-events: none; margin: 0; outline: none; }
.dual-wrap input[type=range]::-webkit-slider-thumb { pointer-events: auto; -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--cyan); border: 2px solid var(--bg); cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.35); }

/* ── List & Reset & Fit ───────────────────────────────── */
.chk-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--t2); cursor: pointer; transition: color .2s; padding: 4px 0; }
.chk-row input { width: 14px; height: 14px; accent-color: var(--cyan); }
.reset-btn, .fit-btn { width: 100%; padding: 9px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: .2s; font-family: inherit; }
.reset-btn { background: transparent; border: 1px solid var(--bdr); color: var(--t2); }
.reset-btn:hover { border-color: var(--bdr-cyan); color: var(--cyan); background: var(--cyan-d); }
.fit-btn { background: var(--glass); border: 1px solid var(--bdr); color: var(--t1); }
.fit-btn:hover { border-color: var(--bdr-cyan); color: var(--cyan); }
.map-item { padding: 11px 12px; border-radius: 13px; cursor: pointer; transition: .2s; border: 1px solid transparent; margin-bottom: 5px; }
.map-item:hover { background: var(--glass2); border-color: var(--bdr); }
.map-item.active { background: var(--cyan-d); border-color: var(--bdr-cyan); }
.mi-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.mi-emoji { font-size: 20px; flex-shrink: 0; }
.mi-name { font-size: 13px; font-weight: 700; }
.mi-cui { font-size: 11px; color: var(--t2); }
.mi-rating { margin-left: auto; font-size: 12px; font-weight: 700; }
.mi-addr { font-size: 12px; color: var(--t3); margin-bottom: 4px; }
.mi-foot { display: flex; align-items: center; justify-content: space-between; }
.mi-hours { font-size: 11px; color: var(--t3); }
.mi-status { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px; }
.s-open { background: var(--cyan-d); color: var(--cyan); }
.s-closed { background: var(--red-d); color: var(--red); }
.list-empty { text-align: center; padding: 32px 12px; font-size: 13px; color: var(--t3); }
.list-empty-ico { font-size: 40px; margin-bottom: 10px; }

/* ══ MOBILE ( ≤ 768px ) ════════════════════════════════════ */
@media (max-width: 768px) {
  .mp-left, .mp-right { display: none !important; }
  .mob-fab-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 599; background: var(--glass-dark); backdrop-filter: blur(16px); padding: 10px 16px; border-radius: 100px; border: 1px solid var(--bdr); box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
  body.light .mob-fab-bar { background: var(--glass-light); box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
  .mob-fab { background: transparent; border: none; color: var(--t1); font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; cursor: pointer; outline: none; }
  .mob-fab.active { color: var(--cyan); }
  .mob-fab-divider { width: 1px; background: var(--bdr); margin: 0 4px; }
  .bs { position: fixed; left: 0; right: 0; bottom: 0; z-index: 600; background: var(--bg3); border-top: 1px solid var(--bdr); border-radius: 24px 24px 0 0; transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1); max-height: 65vh; display: flex; flex-direction: column; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
  body.light .bs { background: var(--glass-light); }
  .bs.expanded { transform: translateY(0); }
  .bs-head { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--bdr); }
  .bs-head-label { font-size: 14px; font-weight: 700; color: var(--t1); display: flex; align-items: center; gap: 8px; }
  .bs-head-count { font-size: 11px; background: var(--cyan-d); color: var(--cyan); border: 1px solid var(--bdr-cyan); padding: 2px 8px; border-radius: 100px; font-weight: 800; }
  
  .bs-close { width: 32px; height: 32px; border-radius: 50%; background: var(--glass2); border: 1px solid var(--bdr); color: var(--t1); font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none; transition: .2s; }
  .bs-close:hover { background: var(--bdr); }

  .bs-body { overflow-y: auto; padding: 16px 20px 24px; flex: 1; }
  .mob-search { position: fixed; top: calc(var(--nav-h) + 8px); left: 12px; right: 12px; z-index: 599; background: var(--glass-dark); border: 1px solid var(--bdr); border-radius: 12px; display: flex; align-items: center; gap: 8px; padding: 10px 14px; }
  body.light .mob-search { background: var(--glass-light); }
  .mob-search input { background: none; border: none; outline: none; color: var(--t1); font-size: 14px; flex: 1; }
  .mob-search input::placeholder { color: var(--t3); }
  .mob-fit { position: fixed; top: calc(var(--nav-h) + 58px); right: 12px; z-index: 599; width: 40px; height: 40px; border-radius: 50%; background: var(--glass-dark); border: 1px solid var(--bdr); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
  body.light .mob-fit { background: var(--glass-light); }
}

/* ── Leaflet popup theme ────────────────────────────────── */
.ug-popup .leaflet-popup-content-wrapper { background: var(--bg3) !important; border: 1px solid var(--bdr2) !important; border-radius: 16px !important; color: var(--t1) !important; box-shadow: 0 20px 60px rgba(0,0,0,.55) !important; padding: 0 !important; }
.ug-popup .leaflet-popup-tip { background: var(--bg3) !important; }
.ug-popup .leaflet-popup-content { margin: 16px 18px !important; }
.leaflet-control-zoom a { background: var(--bg3) !important; color: var(--t1) !important; border-color: var(--bdr2) !important; }
</style>

<script>
// ── ტყვიაგაუმტარი (Bulletproof) UI ──
function initUI() {
  const theme = localStorage.getItem('ug_theme') || 'dark';
  document.body.classList.toggle('light', theme === 'light');
  document.querySelectorAll('.theme-ico').forEach(e => e.textContent = theme === 'dark' ? '🌙' : '☀️');
  
  const lang = localStorage.getItem('ug_lang') || 'ka';
  document.querySelectorAll('.lang-ka').forEach(b => b.classList.toggle('active', lang === 'ka'));
  document.querySelectorAll('.lang-en').forEach(b => b.classList.toggle('active', lang === 'en'));
}

window.toggleTheme = function() {
  let current = localStorage.getItem('ug_theme') || 'dark';
  let next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ug_theme', next);
  initUI();
  if(typeof window.rerenderMap==='function') window.rerenderMap();
};

window.setLang = function(l) {
  localStorage.setItem('ug_lang', l);
  initUI();
  if(typeof applyI18n === 'function') applyI18n();
};

function safeTl(obj) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  const l = localStorage.getItem('ug_lang') || 'ka';
  return obj[l] || obj.ka || '';
}

function LANG_GET_SAFE() {
  return typeof window.LANG_GET === 'function' ? window.LANG_GET() : (localStorage.getItem('ug_lang') || 'ka');
}

// ── State ──
let activeCuisines = [], minRating = 0, maxRating = 5, onlyOpen = false, searchQ = '';
const panelState = { left: false, right: false }; // false = open
let activeMobSheet = null;

// ── UI Controls ──
function togglePanel(side, event) {
  if (event) event.stopPropagation(); 
  const panel = document.getElementById(side === 'left' ? 'panelLeft' : 'panelRight');
  const toggle = document.getElementById(side === 'left' ? 'pl-toggle' : 'pr-toggle');
  panelState[side] = !panelState[side];

  if (panelState[side]) {
    panel.classList.add('collapsed');
    toggle.textContent = side === 'left' ? '🎛️' : '🏠';
    panel.onclick = (e) => { if (panelState[side]) { togglePanel(side, e); } };
  } else {
    panel.classList.remove('collapsed');
    toggle.textContent = '✕';
    panel.onclick = null;
  }
}

function toggleMobSheet(sheetName) {
  const isCurrentlyOpen = activeMobSheet === sheetName;
  closeMobSheets();
  if (!isCurrentlyOpen) {
    activeMobSheet = sheetName;
    document.getElementById(sheetName === 'filter' ? 'bsFilter' : 'bsList').classList.add('expanded');
    document.getElementById(sheetName === 'filter' ? 'fab-filter-btn' : 'fab-list-btn').classList.add('active');
    if (sheetName === 'filter') buildMobileFilter();
  }
}

function closeMobSheets() {
  activeMobSheet = null;
  document.getElementById('bsFilter').classList.remove('expanded');
  document.getElementById('bsList').classList.remove('expanded');
  document.getElementById('fab-filter-btn').classList.remove('active');
  document.getElementById('fab-list-btn').classList.remove('active');
}

function applyResponsive() {
  const mob = window.innerWidth <= 768;
  document.getElementById('panelLeft').style.display = mob ? 'none' : '';
  document.getElementById('panelRight').style.display = mob ? 'none' : '';
  document.getElementById('mobSearch').style.display = mob ? 'flex' : 'none';
  document.getElementById('mobFit').style.display = mob ? 'flex' : 'none';
  document.getElementById('mobFabBar').style.display = mob ? 'flex' : 'none';
  document.getElementById('bsFilter').style.display = mob ? 'flex' : 'none';
  document.getElementById('bsList').style.display = mob ? 'flex' : 'none';
  if (mob) buildMobileFilter();
}

// ── Filtering Logic ──
function buildChips(targetId) {
  const L = LANG_GET_SAFE();
  const id = targetId || 'mapChips';
  const q = (document.getElementById(id === 'mapChips' ? 'catSearch' : 'mobCatSearch')?.value || '').toLowerCase();
  let html = '';

  if (!q) {
    const allSel = activeCuisines.length === 0;
    html += `<button class="cat-chip${allSel?' sel':''}" onclick="toggleCuisine('all','${targetId||''}')">🍽️ ${L==='en'?'All':'ყველა'}</button>`;
  }
  if(typeof CATEGORIES !== 'undefined') {
    CATEGORIES.forEach(c => {
      if (c.id === 'all') return;
      const name = L === 'en' ? c.en : c.ka;
      if (!name.toLowerCase().includes(q)) return;
      const sel = activeCuisines.includes(c.id);
      html += `<button class="cat-chip${sel?' sel':''}" onclick="toggleCuisine('${c.id}','${targetId||''}')">${c.emoji} ${name}</button>`;
    });
  }
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

function toggleCuisine(id, targetId) {
  if (id === 'all') activeCuisines = [];
  else {
    const i = activeCuisines.indexOf(id);
    if (i >= 0) activeCuisines.splice(i, 1);
    else activeCuisines.push(id);
  }
  buildChips('mapChips');
  buildChips('mobCatChips');
  runFilters();
}

function updateSlider(fromMob) {
  const mn = parseFloat(document.getElementById(fromMob ? 'mobRMin' : 'rMin')?.value || 0);
  const mx = parseFloat(document.getElementById(fromMob ? 'mobRMax' : 'rMax')?.value || 5);
  minRating = Math.min(mn, mx);
  maxRating = Math.max(mn, mx);

  ['rMin','mobRMin'].forEach(id => { const el = document.getElementById(id); if(el) el.value = minRating; });
  ['rMax','mobRMax'].forEach(id => { const el = document.getElementById(id); if(el) el.value = maxRating; });
  
  const label = `${minRating.toFixed(1)} – ${maxRating.toFixed(1)} ★`;
  ['rValLbl','mobRValLbl'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = label; });

  const pct1 = (minRating/5)*100, pct2 = (maxRating/5)*100;
  ['dualFill','mobDualFill'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.left = pct1+'%'; el.style.width = (pct2-pct1)+'%'; }
  });
  runFilters();
}

function resetFilters() {
  activeCuisines = []; minRating = 0; maxRating = 5; onlyOpen = false; searchQ = '';
  ['rMin','rMax','mobRMin','mobRMax'].forEach((id,i) => { const el=document.getElementById(id); if(el) el.value=i%2?5:0; });
  ['onlyOpen','mobOnlyOpen'].forEach(id => { const el=document.getElementById(id); if(el) el.checked=false; });
  document.querySelectorAll('.sync-search, .cat-search-in').forEach(el => el.value = '');
  updateSlider(); buildChips('mapChips'); buildChips('mobCatChips'); runFilters();
}

function runFilters() {
  try {
    if(typeof RESTAURANTS === 'undefined') return;
    let list = [...RESTAURANTS];
    if (activeCuisines.length) list = list.filter(r => activeCuisines.includes(r.cuisineTag));
    list = list.filter(r => r.rating >= minRating && r.rating <= maxRating);
    if (onlyOpen) list = list.filter(r => r.status === 'open');
    if (searchQ) {
      const q = searchQ.toLowerCase();
      list = list.filter(r => safeTl(r.name).toLowerCase().includes(q) || safeTl(r.cuisine).toLowerCase().includes(q) || (r.branches && r.branches.some(b => safeTl(b.address).toLowerCase().includes(q))));
    }
    buildList(list); 
    if(typeof UrigodMap !== 'undefined') UrigodMap.render(list);
  } catch(e) { console.error("Filter Error:", e); }
}

// ── Render ──
function buildList(data) {
  try {
    const ka = LANG_GET_SAFE() === 'ka';
    const total = data.reduce((s,r) => s + (r.branches ? r.branches.length : 0), 0);
    ['pr-count','bs-count'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = total; });

    const html = data.length ? data.flatMap(r =>
      (r.branches || []).map(b => {
        const open = b.status === 'open';
        return `<div class="map-item" onclick="selectBranch(${b.lat},${b.lng},this)">
            <div class="mi-top"><span class="mi-emoji">${r.emoji}</span>
              <div style="flex:1;min-width:0"><div class="mi-name">${safeTl(b.name)}</div><div class="mi-cui">${safeTl(r.cuisine)}</div></div>
              <div class="mi-rating"><span class="star">★</span>${r.rating}</div>
            </div>
            <div class="mi-addr">📍 ${safeTl(b.address)}</div>
            <div class="mi-foot">
              <span class="mi-hours">🕐 ${b.hours}</span>
              <span class="mi-status ${open?'s-open':'s-closed'}">${open?(ka?'● ღიაა':'● Open'):(ka?'● დახურ.':'● Closed')}</span>
            </div>
          </div>`;
      })
    ).join('') : `<div class="list-empty"><div class="list-empty-ico">🍽️</div>${ka?'ვერ მოიძებნა':'Not found'}</div>`;

    document.getElementById('mapList').innerHTML = html;
    document.getElementById('bsListBody').innerHTML = html;
  } catch(e) { console.error("List Build Error:", e); }
}

function selectBranch(lat, lng, el) {
  document.querySelectorAll('.map-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
  if(typeof UrigodMap !== 'undefined') UrigodMap.flyTo(lat, lng, 16);
  if (window.innerWidth <= 768) closeMobSheets(); 
}

function buildMobileFilter() {
  const ka = LANG_GET_SAFE() === 'ka';
  document.getElementById('bsFilterBody').innerHTML = `
    <div style="margin-bottom:12px">
      <div class="fl-lbl" style="margin-bottom:6px">${ka?'სამზარეულო':'Cuisine'}</div>
      <input class="cat-search-in" id="mobCatSearch" placeholder="${ka?'🔍 კატეგორია...':'🔍 Category...'}" oninput="buildChips('mobCatChips')">
      <div class="cat-chips" id="mobCatChips" style="max-height:130px"></div>
    </div>
    <div class="mp-divider"></div>
    <div style="margin-bottom:12px">
      <div class="fl-lbl"><span>${ka?'რეიტინგი':'Rating'}</span><span id="mobRValLbl" style="color:var(--cyan);font-weight:800">${minRating.toFixed(1)} – ${maxRating.toFixed(1)} ★</span></div>
      <div class="dual-wrap">
        <div class="dual-track"></div>
        <div class="dual-fill" id="mobDualFill" style="left:${minRating/5*100}%;width:${(maxRating-minRating)/5*100}%"></div>
        <input type="range" id="mobRMin" min="0" max="5" step="0.1" value="${minRating}" oninput="updateSlider(true)">
        <input type="range" id="mobRMax" min="0" max="5" step="0.1" value="${maxRating}" oninput="updateSlider(true)">
      </div>
    </div>
    <div class="mp-divider"></div>
    <label class="chk-row" style="margin-bottom:14px">
      <input type="checkbox" id="mobOnlyOpen" ${onlyOpen?'checked':''} onchange="onlyOpen=this.checked;runFilters()">
      ${ka?'🟢 მხოლოდ ღია':'🟢 Open only'}
    </label>
    <button class="reset-btn" onclick="resetFilters()">${ka?'🔄 გასუფთავება':'🔄 Reset'}</button>
  `;
  buildChips('mobCatChips');
}

// ── i18n & Sync Global Search ──
function applyI18n() {
  try {
    const ka = LANG_GET_SAFE() === 'ka';
    const ph = ka ? 'მოძებნა...' : 'Search...';
    
    document.getElementById('pl-lbl-txt').textContent = ka ? 'ფილტრები' : 'Filters';
    document.getElementById('pr-lbl-txt').textContent = ka ? 'რესტორნები' : 'Restaurants';
    document.getElementById('l-cat').textContent = ka ? 'სამზარეულო' : 'Cuisine';
    document.getElementById('l-rating').textContent = ka ? 'რეიტინგი' : 'Rating';
    document.getElementById('l-status').textContent = ka ? 'სტატუსი' : 'Status';
    document.getElementById('l-open').textContent = ka ? '🟢 მხოლოდ ღია' : '🟢 Open only';
    document.getElementById('l-reset').textContent = ka ? '🔄 გასუფთავება' : '🔄 Reset';
    document.getElementById('l-fit').textContent = ka ? '↔ ყველა ნახვა' : '↔ Fit All';
    
    document.querySelectorAll('.sync-search').forEach(el => el.placeholder = ph);
    const catSearchEl = document.getElementById('catSearch');
    if (catSearchEl) catSearchEl.placeholder = ka ? '🔍 კატეგორია...' : '🔍 Category...';
    
    document.getElementById('bs-fl-txt-mob').textContent = ka ? 'ფილტრები' : 'Filters';
    document.getElementById('bs-li-txt-mob').textContent = ka ? 'რესტორნები' : 'Restaurants';

    // Navbar translation safety
    document.querySelectorAll('.nav-link').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if(k === 'nav_home') el.textContent = ka ? 'მთავარი' : 'Home';
      if(k === 'nav_branches') el.textContent = ka ? 'ფილიალები' : 'Branches';
      if(k === 'nav_map') el.textContent = ka ? 'რუკა' : 'Map';
      if(k === 'nav_about') el.textContent = ka ? 'ჩვენს შესახებ' : 'About Us';
    });

    buildChips('mapChips');
    if (window.innerWidth <= 768) buildMobileFilter();
    runFilters();
  } catch(e) { console.error("i18n Map Error:", e); }
}
window.rerender = applyI18n;

// Ensure scripts bind ONLY after everything is loaded
document.addEventListener('DOMContentLoaded', () => {
  initUI();
  
  if(typeof UrigodMap !== 'undefined' && typeof RESTAURANTS !== 'undefined') {
      UrigodMap.init('fullMap', { center:[41.710,44.790], zoom:13, restaurants:RESTAURANTS });
  }
  
  document.querySelectorAll('.sync-search').forEach(input => {
    input.addEventListener('input', (e) => {
      searchQ = e.target.value.toLowerCase();
      document.querySelectorAll('.sync-search').forEach(other => {
        if (other !== e.target) other.value = e.target.value;
      });
      runFilters();
    });
  });

  const catSearchNode = document.getElementById('catSearch');
  const onlyOpenNode = document.getElementById('onlyOpen');
  
  if (catSearchNode) catSearchNode.addEventListener('input', () => buildChips('mapChips'));
  if (onlyOpenNode) onlyOpenNode.addEventListener('change', e => { onlyOpen = e.target.checked; runFilters(); });

  window.addEventListener('resize', applyResponsive);
  
  applyResponsive();
  applyI18n();
  updateSlider();
});
</script>
</body>
</html>
